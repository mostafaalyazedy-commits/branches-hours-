<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أداة تصدير مواعيد فروع أوشن</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
      background: #eef6f7;
      color: #0e2a33;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #d6e4e7;
      border-radius: 16px;
      padding: 36px 28px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .card h1 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .card p {
      font-size: .92rem;
      color: #5b7480;
      margin-bottom: 24px;
      line-height: 1.7;
    }
    .card a.btn {
      display: block;
      background: #0b7c8c;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      padding: 14px 18px;
      border-radius: 10px;
      transition: background .15s;
    }
    .card a.btn:hover { background: #085f6b; }
    .card a.btn:focus-visible { outline: 3px solid #085f6b; outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>أداة تصدير مواعيد فروع أوشن</h1>
    <p>تصدير مواعيد فروع Ocean Pharmacy و Ocean Care و Saudia Raedaa بصيغة Excel جاهزة للرفع على Google Business Profile.</p>
    <a class="btn"
       href="https://script.google.com/macros/s/AKfycbwLZ29cQ_Mmu3DS8VLDR_cO-HG-twKh8AsB07L0OQAHQzhCchle07D3pJh2RzwX-uo/exec"
       target="_blank"
       rel="noopener">
      فتح أداة تصدير المواعيد
    </a>
  </div>
</body>
</html>
